name: CI

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: CI
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: habit_gamba
          POSTGRES_PASSWORD: habit_gamba
          POSTGRES_USER: habit_gamba
        options: >-
          --health-cmd "pg_isready -U habit_gamba -d habit_gamba"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
        ports:
          - 5432:5432
    env:
      API_BASE_URL: http://localhost:3000
      BOT_API_TOKEN: ci-bot-token
      DATABASE_URL: postgres://habit_gamba:habit_gamba@localhost:5432/habit_gamba
      DISCORD_APPLICATION_ID: ci-discord-app
      DISCORD_BOT_TOKEN: ci-discord-token
      DISCORD_DEV_GUILD_ID: ci-discord-guild
      LOG_LEVEL: info
      NODE_ENV: test
      SERVER_HOST: 0.0.0.0
      SERVER_PORT: 3000
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.8

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Write env file for package scripts
        run: |
          cat > .env <<'ENV'
          API_BASE_URL=http://localhost:3000
          BOT_API_TOKEN=ci-bot-token
          DATABASE_URL=postgres://habit_gamba:habit_gamba@localhost:5432/habit_gamba
          DISCORD_APPLICATION_ID=ci-discord-app
          DISCORD_BOT_TOKEN=ci-discord-token
          DISCORD_DEV_GUILD_ID=ci-discord-guild
          LOG_LEVEL=info
          NODE_ENV=test
          SERVER_HOST=0.0.0.0
          SERVER_PORT=3000
          ENV

      - name: Run migrations
        run: bun --filter @habit-gamba/db db:migrate

      - name: Lint
        run: bun lint

      - name: Typecheck
        run: bun typecheck

      - name: Test
        run: bun run test

      - name: Build Docker image
        run: docker build .
