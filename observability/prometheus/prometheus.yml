global:
  scrape_interval: 15s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["prometheus:9090"]

  - job_name: habit-gamba-server
    metrics_path: /metrics
    static_configs:
      - targets: ["host.docker.internal:3000"]

  - job_name: habit-gamba-bot
    metrics_path: /
    static_configs:
      - targets: ["host.docker.internal:3001"]
